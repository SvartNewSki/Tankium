version: '3'

services:

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./src:/app/
    links:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    volumes:
      - ./src:/app/

  database:
    image: mariadb:10.5.8
    restart: always
    ports:
      - 4000:3306
    expose:
      - 4000
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - database:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8081:80
    environment:
      - PMA_HOST=database
volumes:
  database: